<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Studio Legale - Gestione Completa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1a237e;
            --primary-dark: #0d1b5e;
            --accent: #d32f2f;
            --success: #388e3c;
            --text: #212121;
            --text-light: #666;
            --border: #e0e0e0;
            --bg: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #eeeeee 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .container { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

        .sidebar {
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 25px 15px;
            overflow-y: auto;
            box-shadow: 2px 0 15px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-header { text-align: center; margin-bottom: 35px; padding-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .sidebar-header h2 { font-size: 1.2em; margin-bottom: 5px; }

        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin: 8px 0; }
        .sidebar-menu button {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.08);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-menu button:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); }
        .sidebar-menu button.active { background: rgba(255,255,255,0.25); font-weight: 600; border-left: 3px solid white; }

        .main-content { padding: 30px; overflow-y: auto; }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 25px 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .header h1 { font-size: 1.8em; font-weight: 600; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            border-left: 5px solid var(--primary);
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); }
        .stat-card .number { font-size: 2.2em; font-weight: 700; color: var(--primary); margin: 8px 0; }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            margin-bottom: 30px;
            display: none;
            animation: slideIn 0.3s;
        }

        .card.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card h2 {
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 1.6em;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .card h3 {
            color: var(--primary);
            margin: 25px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #283593;
            font-size: 1.2em;
        }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text); font-weight: 600; }
        .form-group .required { color: var(--accent); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95em;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26,35,126,0.1);
        }

        .button-group { display: flex; gap: 12px; margin-top: 25px; flex-wrap: wrap; }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 6px 20px rgba(26,35,126,0.3); transform: translateY(-2px); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--accent); color: white; }
        .btn-small { padding: 8px 12px; font-size: 0.85em; }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; font-weight: 600; }
        td { padding: 14px 15px; border-bottom: 1px solid var(--border); }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .alert.show { display: flex; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4caf50; }
        .alert-error { background: #ffebee; color: #c62828; border-left: 4px solid #f44336; }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-primary { background: rgba(26,35,126,0.1); color: var(--primary); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show { display: flex; }
        .modal-content { background: white; padding: 35px; border-radius: 12px; max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.3); }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .modal-header h3 { color: var(--primary); font-size: 1.5em; margin: 0; }
        .close-btn { background: none; border: none; font-size: 1.8em; cursor: pointer; color: var(--text-light); }

        .footer {
            text-align: center;
            padding: 25px;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            margin-top: 50px;
            background: var(--bg);
            border-radius: 8px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { position: fixed; left: -260px; height: 100%; z-index: 999; }
            .header { flex-direction: column; gap: 15px; }
            .stats-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>⚖️ Studio Legale</h2>
                <p>CRM Completo</p>
            </div>
            <ul class="sidebar-menu">
                <li><button class="active" onclick="switchView('dashboard')">📊 Dashboard</button></li>
                <li><button onclick="switchView('clienti')">👥 Clienti</button></li>
                <li><button onclick="switchView('pratiche')">📋 Pratiche</button></li>
                <li><button onclick="switchView('agenda')">📅 Agenda</button></li>
                <li><button onclick="switchView('scadenze')">⏰ Scadenze</button></li>
                <li><button onclick="switchView('fatturazione')">💰 Fatturazione</button></li>
                <li><button onclick="switchView('impostazioni')">⚙️ Impostazioni</button></li>
            </ul>
        </div>

        <div class="main-content">
            <div id="alert" class="alert"></div>

            <div id="dashboard" class="card active">
                <div class="header">
                    <h1>📊 Dashboard</h1>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div style="font-size: 2.5em; margin-bottom: 10px;">👥</div>
                        <div class="number" id="totalClienti">0</div>
                        <div style="color: var(--text-light); font-size: 0.9em;">Clienti</div>
                    </div>
                    <div class="stat-card">
                        <div style="font-size: 2.5em; margin-bottom: 10px;">📋</div>
                        <div class="number" id="totalPratiche">0</div>
                        <div style="color: var(--text-light); font-size: 0.9em;">Pratiche</div>
                    </div>
                    <div class="stat-card">
                        <div style="font-size: 2.5em; margin-bottom: 10px;">⏰</div>
                        <div class="number" id="scadenzeUrgenti">0</div>
                        <div style="color: var(--text-light); font-size: 0.9em;">Urgenti</div>
                    </div>
                    <div class="stat-card">
                        <div style="font-size: 2.5em; margin-bottom: 10px;">💰</div>
                        <div class="number" id="fatturatoMese">€0</div>
                        <div style="color: var(--text-light); font-size: 0.9em;">Fatturato</div>
                    </div>
                </div>
                <h3>Informazioni Rapide</h3>
                <div id="infoRapida" style="background: var(--bg); padding: 20px; border-radius: 8px;"></div>
            </div>

            <div id="clienti" class="card">
                <h2>👥 Clienti</h2>
                <input type="text" id="searchClienti" placeholder="Cerca..." style="padding: 12px 15px; border: 1px solid var(--border); border-radius: 6px; width: 100%; max-width: 400px; margin-bottom: 20px;" onkeyup="filtraClienti()">
                <button class="btn btn-primary" onclick="switchView('nuovo-cliente')">➕ Nuovo</button>
                <div id="listaClienti" style="margin-top: 20px;"></div>
            </div>

            <div id="nuovo-cliente" class="card">
                <h2>➕ Nuovo Cliente</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Ragione Sociale <span class="required">*</span></label>
                        <input type="text" id="cliente_nome">
                    </div>
                    <div class="form-group">
                        <label>Tipologia <span class="required">*</span></label>
                        <select id="cliente_tipo"><option>Persona Fisica</option><option>Azienda</option></select>
                    </div>
                    <div class="form-group">
                        <label>Codice Fiscale <span class="required">*</span></label>
                        <input type="text" id="cliente_codfis">
                    </div>
                    <div class="form-group">
                        <label>Email <span class="required">*</span></label>
                        <input type="email" id="cliente_email">
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn btn-success" onclick="salvaClienteNuovo()">💾 Salva</button>
                    <button class="btn btn-primary" onclick="pulisciFormCliente()">🗑️ Pulisci</button>
                </div>
            </div>

            <div id="pratiche" class="card">
                <h2>📋 Pratiche</h2>
                <button class="btn btn-primary" onclick="switchView('nuova-pratica')">➕ Nuova</button>
                <div id="listaPratiche" style="margin-top: 20px;"></div>
            </div>

            <div id="nuova-pratica" class="card">
                <h2>➕ Nuova Pratica</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Numero <span class="required">*</span></label>
                        <input type="text" id="pratica_numero" placeholder="Es. 2024/001">
                    </div>
                    <div class="form-group">
                        <label>Titolo <span class="required">*</span></label>
                        <input type="text" id="pratica_titolo">
                    </div>
                    <div class="form-group">
                        <label>Cliente <span class="required">*</span></label>
                        <select id="pratica_cliente"></select>
                    </div>
                    <div class="form-group">
                        <label>Tipologia</label>
                        <select id="pratica_tipo"><option>Civile</option><option>Penale</option><option>Tributario</option><option>Lavoro</option></select>
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn btn-success" onclick="salvaPraticaNuova()">💾 Salva</button>
                </div>
            </div>

            <div id="agenda" class="card">
                <h2>📅 Agenda</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" id="app_data">
                    </div>
                    <div class="form-group">
                        <label>Ora</label>
                        <input type="time" id="app_ora">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Descrizione</label>
                        <input type="text" id="app_desc">
                    </div>
                </div>
                <button class="btn btn-success" onclick="salvaAppuntamento()">💾 Salva</button>
                <div id="listaAppuntamenti" style="margin-top: 30px;"></div>
            </div>

            <div id="scadenze" class="card">
                <h2>⏰ Scadenze</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Descrizione <span class="required">*</span></label>
                        <input type="text" id="scad_desc">
                    </div>
                    <div class="form-group">
                        <label>Data <span class="required">*</span></label>
                        <input type="date" id="scad_data">
                    </div>
                    <div class="form-group">
                        <label>Priorità</label>
                        <select id="scad_priorita"><option>Bassa</option><option>Media</option><option>Alta</option><option selected>Urgente</option></select>
                    </div>
                </div>
                <button class="btn btn-success" onclick="salvaScadenza()">💾 Salva</button>
                <div id="listaScadenze" style="margin-top: 30px;"></div>
            </div>

            <div id="fatturazione" class="card">
                <h2>💰 Fatturazione</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Cliente <span class="required">*</span></label>
                        <select id="fatt_cliente"></select>
                    </div>
                    <div class="form-group">
                        <label>Importo (€)</label>
                        <input type="number" id="fatt_importo" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>IVA (%)</label>
                        <input type="number" id="fatt_iva" value="22" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Stato</label>
                        <select id="fatt_stato"><option>Non Pagata</option><option>Pagata</option></select>
                    </div>
                </div>
                <button class="btn btn-success" onclick="salvaFattura()">💾 Salva</button>
                <div id="listaFatture" style="margin-top: 30px;"></div>
            </div>

            <div id="impostazioni" class="card">
                <h2>⚙️ Impostazioni</h2>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="esportaDati()">📤 Esporta</button>
                    <button class="btn btn-primary" onclick="creaBackup()">💾 Backup</button>
                    <button class="btn btn-danger" onclick="pulisciTutto()">🗑️ Cancella</button>
                </div>
            </div>

            <div id="modalDettagli" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Dettagli</h3>
                        <button class="close-btn" onclick="chiudiModal('modalDettagli')">&times;</button>
                    </div>
                    <div id="dettagliContenuto"></div>
                </div>
            </div>

            <div class="footer">
                <p>&copy; 2024 CRM Studio Legale. Tutti i diritti riservati.</p>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'crm_studio_legale';

        function switchView(view) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.sidebar-menu button').forEach(b => b.classList.remove('active'));
            document.getElementById(view)?.classList.add('active');
            event?.target?.classList?.add('active');
            caricaDati();
            window.scrollTo(0, 0);
        }

        function mostraAvviso(msg, tipo = 'success') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${tipo} show`;
            alert.textContent = msg;
            setTimeout(() => alert.classList.remove('show'), 4000);
        }

        function chiudiModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function caricaDatiApp() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { clienti: [], pratiche: [], appuntamenti: [], scadenze: [], fatture: [] };
        }

        function salvaDatiApp(dati) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dati));
        }

        // CLIENTI
        function salvaClienteNuovo() {
            const nome = document.getElementById('cliente_nome').value.trim();
            const email = document.getElementById('cliente_email').value.trim();
            const codfis = document.getElementById('cliente_codfis').value.trim();

            if (!nome || !email || !codfis) {
                mostraAvviso('Compilare i campi obbligatori!', 'error');
                return;
            }

            const dati = caricaDatiApp();
            if (dati.clienti.some(c => c.email === email)) {
                mostraAvviso('Email già registrata!', 'error');
                return;
            }

            dati.clienti.push({
                id: Date.now(),
                nome, email, codfis,
                tipo: document.getElementById('cliente_tipo').value
            });

            salvaDatiApp(dati);
            mostraAvviso('✅ Cliente salvato!');
            pulisciFormCliente();
            caricaClientiSelect();
            caricaDashboard();
            switchView('clienti');
        }

        function pulisciFormCliente() {
            document.getElementById('cliente_nome').value = '';
            document.getElementById('cliente_email').value = '';
            document.getElementById('cliente_codfis').value = '';
        }

        function caricaClientiSelect() {
            const dati = caricaDatiApp();
            const selects = ['pratica_cliente', 'fatt_cliente'];
            selects.forEach(id => {
                const sel = document.getElementById(id);
                if (sel) {
                    sel.innerHTML = '<option value="">-- Seleziona --</option>';
                    dati.clienti.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
                }
            });
        }

        function caricaClienti() {
            const dati = caricaDatiApp();
            const container = document.getElementById('listaClienti');
            if (dati.clienti.length === 0) {
                container.innerHTML = '<p>Nessun cliente</p>';
                return;
            }
            container.innerHTML = dati.clienti.map(c => `
                <div style="background: #f9f9f9; padding: 15px; border-radius: 6px; margin: 10px 0; border-left: 4px solid #1a237e;">
                    <h4>${c.nome}</h4>
                    <p>📧 ${c.email}</p>
                    <button class="btn btn-small btn-danger" onclick="eliminaCliente(${c.id})">Elimina</button>
                </div>
            `).join('');
        }

        function filtraClienti() {
            const search = document.getElementById('searchClienti').value.toLowerCase();
            const dati = caricaDatiApp();
            const filtrati = dati.clienti.filter(c => c.nome.toLowerCase().includes(search));
            const container = document.getElementById('listaClienti');
            container.innerHTML = filtrati.map(c => `
                <div style="background: #f9f9f9; padding: 15px; border-radius: 6px; margin: 10px 0;">
                    <h4>${c.nome}</h4>
                    <p>📧 ${c.email}</p>
                </div>
            `).join('');
        }

        function eliminaCliente(id) {
            if (!confirm('Eliminare?')) return;
            const dati = caricaDatiApp();
            dati.clienti = dati.clienti.filter(c => c.id !== id);
            salvaDatiApp(dati);
            caricaClienti();
            caricaClientiSelect();
        }

        // PRATICHE
        function salvaPraticaNuova() {
            const numero = document.getElementById('pratica_numero').value.trim();
            const titolo = document.getElementById('pratica_titolo').value.trim();
            const clienteId = document.getElementById('pratica_cliente').value;

            if (!numero || !titolo || !clienteId) {
                mostraAvviso('Campi obbligatori!', 'error');
                return;
            }

            const dati = caricaDatiApp();
            dati.pratiche.push({
                id: Date.now(),
                numero, titolo,
                cliente_id: parseInt(clienteId),
                tipo: document.getElementById('pratica_tipo').value,
                stato: 'Aperta'
            });

            salvaDatiApp(dati);
            mostraAvviso('✅ Pratica salvata!');
            document.getElementById('pratica_numero').value = '';
            document.getElementById('pratica_titolo').value = '';
            caricaClientiSelect();
            caricaDashboard();
            switchView('pratiche');
        }

        function caricaPratiche() {
            const dati = caricaDatiApp();
            const container = document.getElementById('listaPratiche');
            if (dati.pratiche.length === 0) {
                container.innerHTML = '<p>Nessuna pratica</p>';
                return;
            }
            container.innerHTML = dati.pratiche.map(p => {
                const cliente = dati.clienti.find(c => c.id === parseInt(p.cliente_id));
                return `
                    <div style="background: #f9f9f9; padding: 15px; border-radius: 6px; margin: 10px 0; border-left: 4px solid #d32f2f;">
                        <h4>${p.numero} - ${p.titolo}</h4>
                        <p>Cliente: ${cliente ? cliente.nome : 'N/A'} | Tipo: ${p.tipo}</p>
                        <button class="btn btn-small btn-danger" onclick="eliminaPratica(${p.id})">Elimina</button>
                    </div>
                `;
            }).join('');
        }

        function eliminaPratica(id) {
            if (!confirm('Eliminare?')) return;
            const dati = caricaDatiApp();
            dati.pratiche = dati.pratiche.filter(p => p.id !== id);
            salvaDatiApp(dati);
            caricaPratiche();
        }

        // APPUNTAMENTI
        function salvaAppuntamento() {
            const data = document.getElementById('app_data').value;
            const ora = document.getElementById('app_ora').value;
            const desc = document.getElementById('app_desc').value.trim();

            if (!data || !ora || !desc) {
                mostraAvviso('Campi obbligatori!', 'error');
                return;
            }

            const dati = caricaDatiApp();
            dati.appuntamenti.push({ id: Date.now(), data, ora, desc });
            salvaDatiApp(dati);
            mostraAvviso('✅ Appuntamento salvato!');
            document.getElementById('app_data').value = '';
            document.getElementById('app_ora').value = '';
            document.getElementById('app_desc').value = '';
            caricaAppuntamenti();
        }

        function caricaAppuntamenti() {
            const dati = caricaDatiApp();
            const container = document.getElementById('listaAppuntamenti');
            if (dati.appuntamenti.length === 0) {
                container.innerHTML = '<p>Nessun appuntamento</p>';
                return;
            }
            container.innerHTML = '<h3>Appuntamenti Registrati</h3>' + dati.appuntamenti.map(a => `
                <div style="background: #f9f9f9; padding: 15px; border-radius: 6px; margin: 10px 0;">
                    <p><strong>📅 ${new Date(a.data).toLocaleDateString('it-IT')} - ${a.ora}</strong></p>
                    <p>${a.desc}</p>
                    <button class="btn btn-small btn-danger" onclick="eliminaAppuntamento(${a.id})">Elimina</button>
                </div>
            `).join('');
        }

        function eliminaAppuntamento(id) {
            const dati = caricaDatiApp();
            dati.appuntamenti = dati.appuntamenti.filter(a => a.id !== id);
            salvaDatiApp(dati);
            caricaAppuntamenti();
        }

        // SCADENZE
        function salvaScadenza() {
            const desc = document.getElementById('scad_desc').value.trim();
            const data = document.getElementById('scad_data').value;

            if (!desc || !data) {
                mostraAvviso('Campi obbligatori!', 'error');
                return;
            }

            const dati = caricaDatiApp();
            dati.scadenze.push({
                id: Date.now(),
                desc, data,
                priorita: document.getElementById('scad_priorita').value,
                completata: false
            });

            salvaDatiApp(dati);
            mostraAvviso('✅ Scadenza salvata!');
            document.getElementById('scad_desc').value = '';
            document.getElementById('scad_data').value = '';
            caricaScadenze();
            caricaDashboard();
        }

        function caricaScadenze() {
            const dati = caricaDatiApp();
            const container = document.getElementById('listaScadenze');
            const oggi = new Date().toISOString().split('T')[0];
            const scadenze = [...dati.scadenze].filter(s => !s.completata).sort((a, b) => new Date(a.data) - new Date(b.data));

            if (scadenze.length === 0) {
                container.innerHTML = '<p>Nessuna scadenza in sospeso</p>';
                return;
            }

            container.innerHTML = '<h3>Scadenze Prossime</h3>' + scadenze.map(s => {
                const isUrgent = s.data <= oggi;
                return `
                    <div style="background: ${isUrgent ? '#ffebee' : '#f9f9f9'}; padding: 15px; border-radius: 6px; margin: 10px 0;">
                        <p><strong>📅 ${new Date(s.data).toLocaleDateString('it-IT')}</strong></p>
                        <p>${s.desc}</p>
                        <span class="badge badge-primary">${s.priorita}</span>
                        <button class="btn btn-small btn-success" onclick="completaScadenza(${s.id})" style="margin-left: 10px;">✅</button>
                        <button class="btn btn-small btn-danger" onclick="eliminaScadenza(${s.id})">🗑️</button>
                    </div>
                `;
            }).join('');
        }

        function completaScadenza(id) {
            const dati = caricaDatiApp();
            const scadenza = dati.scadenze.find(s => s.id === id);
            if (scadenza) {
                scadenza.completata = true;
                salvaDatiApp(dati);
                caricaScadenze();
                caricaDashboard();
                mostraAvviso('✅ Scadenza completata!');
            }
        }

        function eliminaScadenza(id) {
            const dati = caricaDatiApp();
            dati.scadenze = dati.scadenze.filter(s => s.id !== id);
            salvaDatiApp(dati);
            caricaScadenze();
        }

        // FATTURAZIONE
        function salvaFattura() {
            const clienteId = document.getElementById('fatt_cliente').value;
            const importo = document.getElementById('fatt_importo').value;

            if (!clienteId || !importo) {
                mostraAvviso('Campi obbligatori!', 'error');
                return;
            }

            const dati = caricaDatiApp();
            const iva = parseFloat(document.getElementById('fatt_iva').value);
            const totale = parseFloat(importo) * (1 + iva / 100);

            dati.fatture.push({
                id: Date.now(),
                cliente_id: parseInt(clienteId),
                importo: parseFloat(importo),
                iva: iva,
                totale: totale,
                stato: document.getElementById('fatt_stato').value,
                data: new Date().toISOString().split('T')[0]
            });

            salvaDatiApp(dati);
            mostraAvviso('✅ Fattura salvata!');
            document.getElementById('fatt_importo').value = '';
            caricaFatture();
            caricaDashboard();
        }

        function caricaFatture() {
            const dati = caricaDatiApp();
            const container = document.getElementById('listaFatture');

            if (dati.fatture.length === 0) {
                container.innerHTML = '<p>Nessuna fattura</p>';
                return;
            }

            container.innerHTML = '<h3>Fatture Registrate</h3>' + dati.fatture.map(f => {
                const cliente = dati.clienti.find(c => c.id === parseInt(f.cliente_id));
                return `
                    <div style="background: #f9f9f9; padding: 15px; border-radius: 6px; margin: 10px 0;">
                        <p><strong>Cliente:</strong> ${cliente ? cliente.nome : 'N/A'}</p>
                        <p><strong>Importo:</strong> €${f.totale.toFixed(2)} | <strong>Stato:</strong> ${f.stato}</p>
                        <button class="btn btn-small btn-danger" onclick="eliminaFattura(${f.id})">Elimina</button>
                    </div>
                `;
            }).join('');
        }

        function eliminaFattura(id) {
            const dati = caricaDatiApp();
            dati.fatture = dati.fatture.filter(f => f.id !== id);
            salvaDatiApp(dati);
            caricaFatture();
            caricaDashboard();
        }

        // DASHBOARD
        function caricaDashboard() {
            const dati = caricaDatiApp();
            const oggi = new Date();
            const inizio30 = new Date(oggi.getTime() - 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

            document.getElementById('totalClienti').textContent = dati.clienti.length;
            document.getElementById('totalPratiche').textContent = dati.pratiche.length;
            document.getElementById('scadenzeUrgenti').textContent = dati.scadenze.filter(s => !s.completata && s.data <= oggi.toISOString().split('T')[0]).length;

            let fatturatoMese = 0;
            dati.fatture.forEach(f => {
                if (f.data >= inizio30) fatturatoMese += f.totale;
            });
            document.getElementById('fatturatoMese').textContent = '€' + fatturatoMese.toFixed(0);

            const fine7 = new Date(oggi.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            const scadenzeProx = dati.scadenze.filter(s => !s.completata && s.data >= oggi.toISOString().split('T')[0] && s.data <= fine7).length;

            document.getElementById('infoRapida').innerHTML = `
                <p>📅 Scadenze nei prossimi 7 giorni: <strong>${scadenzeProx}</strong></p>
                <p>📋 Pratiche da seguire: <strong>${dati.pratiche.length}</strong></p>
                <p>👥 Clienti gestiti: <strong>${dati.clienti.length}</strong></p>
            `;
        }

        function caricaDati() {
            caricaClienti();
            caricaPratiche();
            caricaAppuntamenti();
            caricaScadenze();
            caricaFatture();
            caricaDashboard();
            caricaClientiSelect();
        }

        function esportaDati() {
            const dati = caricaDatiApp();
            const json = JSON.stringify(dati, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `crm-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            mostraAvviso('✅ Dati esportati!');
        }

        function creaBackup() {
            const dati = caricaDatiApp();
            localStorage.setItem('backup_crm', JSON.stringify(dati));
            mostraAvviso('✅ Backup creato!');
        }

        function pulisciTutto() {
            if (!confirm('ATTENZIONE: Cancellare TUTTI i dati?')) return;
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('app_data').valueAsDate = new Date();
            document.getElementById('scad_data').valueAsDate = new Date();
            caricaDati();
        });
    </script>
</body>
</html>
